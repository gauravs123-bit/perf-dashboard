name: Refresh Redash Queries

on:
  schedule:
    # 7:30 AM IST = 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Force-execute all Redash queries
        env:
          REDASH_BASE_URL: ${{ secrets.REDASH_BASE_URL }}
          REDASH_API_KEY:  ${{ secrets.REDASH_API_KEY }}
        run: |
          set -e

          # All query IDs: app-level + creative-level
          QUERY_IDS="89268 89172 89171 96035 97452 86001 86002 86364 86447 97486"

          for QID in $QUERY_IDS; do
            echo "→ Refreshing query $QID ..."
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              "${REDASH_BASE_URL}/api/queries/${QID}/results" \
              -H "Authorization: Key ${REDASH_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"max_age": 0}')

            if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
              echo "  ✓ $QID → $HTTP"
            else
              echo "  ✗ $QID → $HTTP (non-fatal, continuing)"
            fi

            # Small delay to avoid hammering Redash
            sleep 2
          done

          echo "Done. All queries triggered."
